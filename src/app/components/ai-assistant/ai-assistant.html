
<div class="chat-container fade-in">
  <div class="chat-header p-3 d-flex align-items-center justify-content-between">
    <h5 class="m-0 text-white fw-bold"><i class="bi bi-robot me-2"></i>AI Learning Assistant</h5>
    <span class="badge rounded-pill bg-success shadow-sm">Online</span>
  </div>

  <div class="chat-body p-4" #scrollContainer>
    <div *ngFor="let chat of chats" 
         [ngClass]="{'message-user': chat.sender === 'You', 'message-bot': chat.sender === 'Bot'}" 
         class="mb-3 d-flex flex-column">
      <div class="message-bubble p-3 shadow-sm">
        <span class="d-block fw-bold small mb-1 opacity-75">{{chat.sender}}</span>
        {{chat.text}}
      </div>
      <small class="text-muted mt-1 message-time">{{chat.time}}</small>
    </div>
  </div>

  <div class="chat-footer p-3">
    <div class="input-group">
      <input type="text" 
             class="form-control bg-dark text-white border-secondary custom-input" 
             [(ngModel)]="newMessage" 
             (keyup.enter)="sendMessage()"
             placeholder="Ask me anything about your course...">
      <button class="btn btn-primary px-4 shadow-neon" (click)="sendMessage()">
        <i class="bi bi-send"></i>
      </button>
    </div>
  </div>
</div>
